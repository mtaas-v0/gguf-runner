name: Release

on:
  push:
    tags:
      - "*"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --all-targets --all-features

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-targets --all-features

  build:
    name: build (${{ matrix.name }})
    needs: [fmt, clippy, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rustflags: -C target-cpu=x86-64
            binary_name: gguf-runner
          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            rustflags: -C target-cpu=generic
            binary_name: gguf-runner
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            rustflags: ""
            binary_name: gguf-runner
          - name: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            rustflags: -C target-cpu=x86-64
            binary_name: gguf-runner.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Configure Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Build release binary (custom rustflags)
        if: matrix.rustflags != ''
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} --locked
      - name: Build release binary (default target flags)
        if: matrix.rustflags == ''
        run: cargo build --release --target ${{ matrix.target }} --locked
      - name: Compute archive name
        id: package_meta
        shell: bash
        run: |
          mkdir -p dist
          archive_base="gguf-runner-${GITHUB_REF_NAME}-${{ matrix.name }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            archive_file="${archive_base}.zip"
          else
            archive_file="${archive_base}.tar.gz"
          fi
          echo "archive_file=${archive_file}" >> "$GITHUB_OUTPUT"
      - name: Package archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -czf "dist/${{ steps.package_meta.outputs.archive_file }}" \
            -C "target/${{ matrix.target }}/release" "${{ matrix.binary_name }}"
      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" `
            -DestinationPath "dist/${{ steps.package_meta.outputs.archive_file }}" `
            -Force
      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-release
          path: dist/${{ steps.package_meta.outputs.archive_file }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

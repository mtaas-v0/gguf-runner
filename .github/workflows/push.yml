name: Push

on:
  workflow_dispatch: 
  push:
    branches:
      - main

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --all-targets --all-features

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-targets --all-features

  build:
    name: build (${{ matrix.name }})
    needs: [fmt, clippy, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rustflags: -C target-cpu=x86-64
            artifact_name: gguf-runner-linux-amd64
            artifact_path: target/x86_64-unknown-linux-gnu/release/gguf-runner
          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            rustflags: -C target-cpu=generic
            artifact_name: gguf-runner-linux-arm64
            artifact_path: target/aarch64-unknown-linux-gnu/release/gguf-runner
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            rustflags: ""
            artifact_name: gguf-runner-macos-arm64
            artifact_path: target/aarch64-apple-darwin/release/gguf-runner
          - name: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            rustflags: -C target-cpu=x86-64
            artifact_name: gguf-runner-windows-amd64
            artifact_path: target/x86_64-pc-windows-msvc/release/gguf-runner.exe
          - name: windows-arm64
            os: windows-11-arm 
            target: aarch64-pc-windows-msvc
            rustflags: -C target-cpu=oryon
            artifact_name: gguf-runner-windows-arm64
            artifact_path: target/x86_64-pc-windows-msvc/release/gguf-runner.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Configure Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.target }}
      - name: Build release binary (custom rustflags)
        if: matrix.rustflags != ''
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} --locked
      - name: Build release binary (default target flags)
        if: matrix.rustflags == ''
        run: cargo build --release --target ${{ matrix.target }} --locked
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 1
